{% extends "base.html" %}
{% block title %}Editar habilidade - PeopleFlow{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <p class="breadcrumb">PeopleFlow / Habilidades / Editar</p>
        <h1>Editar habilidade</h1>
    </div>
</div>
<form method="post" action="{{ url_for('skills.update_post', id=skill.id) }}" class="form panel" data-validate>
    <label>Nome
        <input type="text" name="name" value="{{ skill.name }}" required>
    </label>
    <div class="form-actions">
        <button class="button primary" type="submit">Atualizar</button>
        <a class="button ghost" href="{{ url_for('skills.index') }}">Cancelar</a>
    </div>
</form>
{% endblock %}
